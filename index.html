<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelruue Profile</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0b111e 0%, #000000 100%);
            background-attachment: fixed;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 60px;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* Profile Avatar */
        .main-profile {
            position: relative;
            margin-bottom: 25px;
        }

        .main-profile .avatar-wrapper {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #1f2d44, #0b111e);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6), inset 0 0 10px rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .main-profile img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        /* Telegram Icon Button */
        .telegram-icon {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .telegram-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-50%) scale(1.05);
        }

        /* Group Section Header */
        .section-title {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.35em;
            margin-top: 60px;
            margin-bottom: 40px;
            color: #ffffff;
            text-align: center;
            text-transform: uppercase;
            padding-left: 0.35em; 
        }

        /* Cards Layout */
        .cards {
            width: 100%;
            max-width: 680px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 0 20px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .card .info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: right;
        }

        .card .info h2 {
            font-size: 15px;
            font-weight: 500;
            color: #ffffff;
        }

        .card .info p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
        }

        .card img {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            object-fit: cover;
        }

        /* Sticky Music Bar Layout */
        .music-box {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000000;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
        }

        .left-controls {
            display: flex;
            align-items: center;
            gap: 14px;
            max-width: 30%;
        }

        .album-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .album-art {
            width: 42px;
            height: 42px;
            border-radius: 6px;
            object-fit: cover;
        }

        .song-title {
            font-size: 14px;
            font-weight: 500;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Center Track Core */
        .player-core {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-grow: 1;
            max-width: 600px;
            margin: 0 40px;
        }

        .volume-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .volume-btn:hover {
            color: #ffffff;
        }

        .time-display {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            min-width: 40px;
            text-align: center;
        }

        #progress {
            flex-grow: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        #progress::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        /* Right Interface Triggers */
        .right-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #ffffff;
            width: 44px;
            height: 34px;
            border-radius: 17px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-btn {
            background: #0d1e2d;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
            padding: 0 20px;
            height: 34px;
            border-radius: 17px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-arrow-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #ffffff;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .play-arrow-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .cards {
                grid-template-columns: 1fr;
            }
            .music-box {
                flex-direction: column;
                gap: 14px;
                padding: 14px 20px;
            }
            .player-core {
                margin: 0;
                width: 100%;
            }
            .left-controls {
                max-width: 100%;
            }
            body {
                padding-bottom: 180px;
            }
        }
    </style>
</head>
<body>

    <div class="main-profile">
        <div class="avatar-wrapper">
            <a href="https://t.me/angelruue" target="_blank">
                <img src="rnd12.jpg" alt="@angelruue">
            </a>
        </div>
        <a href="https://t.me/angelruue" target="_blank" class="telegram-icon">
            <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </a>
    </div>

    <h1 class="section-title">EXPERIENCES</h1>

    <div class="cards">

        <a class="card" href="https://t.me/YYYYRUE" target="_blank">
            <div class="info">
                <h2>confused</h2>
                <p>@YYYYRUE</p>
            </div>
            <img src="Screenshot 2026-05-23 170504.png" alt="confused">
        </a>

        <a class="card" href="https://t.me/angelruue30BOT" target="_blank">
            <div class="info">
                <h2>ايلينا</h2>
                <p>@angelruue30BOT</p>
            </div>
            <img src="rnd.jpg" alt="ايلينا">
        </a>

    </div>

    <div class="music-box">
        
        <div class="left-controls">
            <div class="album-wrapper">
                <span class="song-title">ايلينا - العالم اذا مو انت بي</span>
                <img src="rnd.jpg" alt="Album Cover" class="album-art">
            </div>
        </div>

        <div class="player-core">
            <button class="volume-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
            </button>
            
            <span id="current-time" class="time-display">0:00</span>
            
            <audio id="audio" src="rnnnd.mp3" preload="metadata"></audio>
            <input type="range" id="progress" value="0" min="0" step="0.1">
            
            <span id="duration-time" class="time-display">0:00</span>
        </div>

        <div class="right-controls">
            <button class="brand-btn">X</button>
            <button class="status-btn">Finally</button>
            <button onclick="playPause()" id="playBtn" class="play-arrow-btn">◀</button>
        </div>

    </div>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const progress = document.getElementById('progress');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationTimeDisplay = document.getElementById('duration-time');

        function playPause() {
            if (audio.paused) {
                audio.play().catch(e => console.log("Audio target ready."));
                playBtn.innerText = "❚❚";
            } else {
                audio.pause();
                playBtn.innerText = "◀";
            }
        }

        // Standard time layout helper
        function formatTime(secs) {
            let min = Math.floor(secs / 60);
            let sec = Math.floor(secs % 60);
            if (sec < 10) sec = "0" + sec;
            return min + ":" + sec;
        }

        // Display total length once track details pull through
        audio.addEventListener('loadedmetadata', () => {
            progress.max = audio.duration;
            durationTimeDisplay.innerText = formatTime(audio.duration);
        });

        // Keep timeline slider syncing smoothly with playback
        audio.addEventListener('timeupdate', () => {
            if (!audio.seeking) {
                progress.value = audio.currentTime;
            }
            currentTimeDisplay.innerText = formatTime(audio.currentTime);
        });

        // Jump instantly when you drag/click timeline track
        progress.addEventListener('input', () => {
            audio.currentTime = progress.value;
        });
    </script>
</body>
</html>
